# Proves the package builds and packs cleanly on every PR before a publish tag.
name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: build-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm publish --dry-run --access public
